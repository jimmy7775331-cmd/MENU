<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>点餐系统</title>

<style>
body {
  font-family: Arial;
  text-align: center;
}

.menu {
  border: 1px solid #ddd;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
}

img {
  width: 120px;
  height: 100px;
  object-fit: cover;
}
</style>

</head>
<body>

<h1>🍽 点餐系统</h1>

<div class="menu">
  <img src="https://via.placeholder.com/120">
  <p>鸡饭 RM8</p>
  <button onclick="add('鸡饭', 8)">添加</button>
</div>

<div class="menu">
  <img src="https://via.placeholder.com/120">
  <p>奶茶 RM5</p>
  <button onclick="add('奶茶', 5)">添加</button>
</div>

<div class="menu">
  <img src="https://via.placeholder.com/120">
  <p>咖啡 RM4</p>
  <button onclick="add('咖啡', 4)">添加</button>
</div>

<h2>订单：</h2>
<ul id="list"></ul>

<h3>总价: RM <span id="total">0</span></h3>
<h3>订单号: <span id="orderId"></span></h3>

<button onclick="send()">📲下单</button>

<script>
document.getElementById("orderId").innerText = Math.floor(Math.random() * 100000);
</script><script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDLQxS8IKc0hr58TwtgnJyYpXyP_1QW_ew",
  authDomain: "menu-system-78d7e.firebaseapp.com",
  projectId: "menu-system-78d7e",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let total = 0;
let order = [];
let orderId = Math.floor(Math.random() * 100000);

function add(name, price) {
  total += price;
  order.push(name + " RM" + price);

  document.getElementById("total").innerText = total;

  let li = document.createElement("li");
  li.innerText = name + " RM" + price;
  document.getElementById("list").appendChild(li);
}

function send() {
  let data = {
    orderId: orderId,
    items: order,
    total: total,
    time: new Date().toLocaleString()
  };

  // 🔥 保存到数据库
  db.collection("orders").add(data);

  let text = "订单号: " + orderId +
             "\n" + order.join("\n") +
             "\n总价: RM" + total;

  let phone = "601127488180";

  let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(text);

  window.open(url);
}
</script>
