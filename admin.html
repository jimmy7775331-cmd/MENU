<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>订单后台</title>
</head>

<body>

<h1>📊 订单后台</h1>

<ul id="orders"></ul>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDLQxS8IKc0hr58TwtgnJyYpXyP_1QW_ew",
  authDomain: "menu-system-78d7e.firebaseapp.com",
  projectId: "menu-system-78d7e",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔥 读取订单
db.collection("orders").orderBy("time", "desc")
.onSnapshot((snapshot) => {
  let list = document.getElementById("orders");
  list.innerHTML = "";

  snapshot.forEach((doc) => {
    let data = doc.data();

    let li = document.createElement("li");
    li.innerText =
      "订单号: " + data.orderId +
      " | " + data.items.join(", ") +
      " | RM" + data.total +
      " | " + data.time;

    list.appendChild(li);
  });
});
</script>

</body>
</html>
